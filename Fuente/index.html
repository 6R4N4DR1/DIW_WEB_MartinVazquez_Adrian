<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/css/style.css">
    <link rel="icon" type="image/x-icon" href="img/Icons/Favicon/favicon.ico">

    <script src="https://kit.fontawesome.com/180c35a309.js" crossorigin="anonymous"></script>
    <script src="js/script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">

    <title>PHANTOM Central Hub</title>
</head>
<body>
    <header id="header">
        <picture>
            <source type="image/webp" srcset="img/Header-Footer/EXTRA/WEBP/HEADERLEFT.webp"/>

            <source type="image/avif" srcset="img/Header-Footer/EXTRA/AVIF/HEADERLEFT.avif"/>
            <img src="img/Header-Footer/EXTRA/JPG/HEADERLEFT.jpg" alt="Decorative left image" id="decor-left">

            <picture>

                <h3 class="header-title">PHANTOM</h3>

                <h4 class="header-subtitle">CENTRAL HUB</h4>

        </a>

                <li>

                            <source type="image/webp" srcset="img/Header-Footer/NAV/WEBP/-480px/home360px.webp"/>

                        </picture>
                        <h3 class="header-title">HOME</h3>

                </li>
                <li>
                    <details>

                                <source type="image/webp" srcset="img/Header-Footer/NAV/WEBP/-480px/group-discussion360px.webp"/>

                                <source type="image/avif" srcset="img/Header-Footer/NAV/AVIF/-480px/group-discussion360px.avif"/>
                                <img src="img/Header-Footer/NAV/PNG/-480px/group-discussion360px.png" alt="Events icon" class="navlogos">
                            </picture>
                            <h3 class="header-title">EVENTS</h3>
                        </summary>
                        <ul class="navdrop">
                            <li>
                                <a href="html/active.html">ACTIVE</a>
                            </li>
                            <li>
                                <a href="html/scheduled.html">SCHEDULED</a>
                            </li>
                        </ul>
                    </details>
                </li>
                <li>
                    <details>
                        <summary>
                            <picture>
                                <source type="image/webp" srcset="img/Header-Footer/NAV/WEBP/-480px/megaphone360px.webp"/>
                                <source type="image/png" srcset="img/Header-Footer/NAV/PNG/-480px/megaphone360px.png"/>
                                <source type="image/avif" srcset="img/Header-Footer/NAV/AVIF/-480px/megaphone360px.avif"/>
                                <img src="img/Header-Footer/NAV/PNG/-480px/megaphone360px.png" alt="Community icon" class="navlogos">
                            </picture>
                            <h3 class="header-title">COMMUNITY</h3>
                        </summary>
                        <ul class="navdrop">
                            <li>
                                <a href="html/polls.html">POLLS</a>
                            </li>
                            <li>
                                <a href="html/tutorials.html">TUTORIALS</a>
                            </li>
                            <li>
                                <a href="html/developers.html">DEVELOPERS</a>
                            </li>
                            <li>
                                <a href="html/users.html">USERS</a>
                            </li>
                        </ul>
                    </details>

                        <picture>
                            <source type="image/webp" srcset="img/Header-Footer/NAV/WEBP/-480px/trophy360px.webp"/>

    <aside id="sidebar-one">
        <p>
            <a href="html/login.html" class="login">LOG IN</a>
            /
            <a href="html/register.html" class="register">REGISTER</a>
        </p>
    </aside>

    </main>
    <footer id="footer">
        <section id="certification-container">
            <picture>
                <source type="image/webp" srcset="img/Header-Footer/LOGOS/WEBP/-480px/TheRobineCertificate360px.webp"/>

            </picture>
        </section>
        <nav id="navfooter">
            <a href="html/aboutus.html" id="about">
                <p>ABOUT US</p>
            </a>
            <a href="https://docs.google.com/document/d/1NgJfQ0hf8yU_roTLZmAxqYtQPy_CvCqVIGaHLYhlsJ0/edit?tab=t.0#heading=h.rkhhyqrck0s4" id="info">
                <p>INFORMATION</p>
            </a>
        </nav>
        <section id="social-container">
            <picture>
                <source type="image/svg+xml" srcset="img/Icons/SocialNetworks/discord.svg"/>
                <img src="img/Icons/SocialNetworks/discord.svg" alt="Discord logo" id="discord">
            </picture>
            <picture>
                <source type="image/svg+xml" srcset="img/Icons/SocialNetworks/roblox.svg"/>
                <img src="img/Icons/SocialNetworks/roblox.svg" alt="Roblox logo" id="roblox">
            </picture>
            <picture>
                <source type="image/svg+xml" srcset="img/Icons/SocialNetworks/guilded.svg"/>
                <img src="img/Icons/SocialNetworks/guilded.svg" alt="Guilded logo" id="guilded">
            </picture>
